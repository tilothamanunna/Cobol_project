<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Open Account</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm">
        <h2 class="text-2xl font-bold mb-6">New Account</h2>
        <form action="/accounts/create-form" method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Full Name" required class="w-full p-3 border rounded">
            <input type="number" name="balance" placeholder="Initial Deposit" required class="w-full p-3 border rounded">
            <select name="system" class="w-full p-3 border rounded">
                <option value="Mainframe-z15">Mainframe-z15</option>
                <option value="Cloud-Hybrid">Cloud-Hybrid</option>
            </select>
            <button class="w-full bg-green-600 text-white py-3 rounded font-bold">Initialize</button>
        </form>
    </div>
</body>
</html>
