<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Transfer</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm">
        <h2 class="text-2xl font-bold mb-6">Send Money</h2>
        <form action="/accounts/transfer-form" method="POST" class="space-y-4">
            <select name="from_account" class="w-full p-3 border rounded">
                {% for acc in accounts %}<option value="{{ acc.id }}">{{ acc.name }} - ${{ acc.balance }}</option>{% endfor %}
            </select>
            <input type="text" name="to_account" placeholder="To Account ID" required class="w-full p-3 border rounded">
            <input type="number" name="amount" placeholder="Amount" required class="w-full p-3 border rounded">
            <button class="w-full bg-blue-600 text-white py-3 rounded font-bold">Confirm Transfer</button>
            <a href="/" class="block text-center text-gray-400 mt-4">Cancel</a>
        </form>
    </div>
</body>
</html>
