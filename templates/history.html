<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>History</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-sm">
        <h2 class="text-2xl font-bold mb-6">Transaction History</h2>
        <table class="w-full text-left">
            <thead class="bg-gray-50"><tr><th class="p-4">Sender</th><th class="p-4">Recipient</th><th class="p-4">Amount</th></tr></thead>
            <tbody>
                {% for tx in history %}
                <tr><td class="p-4">{{ tx.from_account }}</td><td class="p-4">{{ tx.to_account }}</td><td class="p-4 font-bold">-${{ tx.amount }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="inline-block mt-6 text-blue-600 font-bold">← Back to Dashboard</a>
    </div>
</body>
</html>
